<!DOCTYPE html>
<html class="staticrypt-html">
<head>
  <meta charset="utf-8" />
  <title>Social Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="cache-control" content="max-age=0" />
  <meta http-equiv="cache-control" content="no-cache" />
  <meta http-equiv="expires" content="0" />
  <meta http-equiv="pragma" content="no-cache" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .staticrypt-html,
    .staticrypt-body {
      height: 100%;
      font-family: 'Inter', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .staticrypt-body {
      background: #0F1117;
      background-image:
        radial-gradient(ellipse 60% 50% at 50% -10%, rgba(200,25,26,0.18) 0%, transparent 70%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* ── Spinner ── */
    .staticrypt-spinner-container {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .staticrypt-spinner {
      width: 2rem; height: 2rem;
      border: 3px solid rgba(255,255,255,0.15);
      border-right-color: #C8191A;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* ── Card ── */
    .staticrypt-content {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .staticrypt-form {
      background: #1A1D27;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 40px 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    /* ── Logo + Header ── */
    .suno-logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
    }
    .suno-logo-wrap img {
      height: 32px;
      width: auto;
    }

    .staticrypt-title {
      font-size: 18px;
      font-weight: 800;
      color: #F9FAFB;
      text-align: center;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    .staticrypt-instructions {
      font-size: 13px;
      color: #6B7280;
      text-align: center;
      margin-bottom: 28px;
      font-weight: 500;
    }

    /* ── Divider ── */
    .staticrypt-hr {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.07);
      margin-bottom: 24px;
    }

    /* ── Input ── */
    .staticrypt-password-container {
      position: relative;
      width: 100%;
      margin-bottom: 14px;
    }

    .staticrypt-password-container input[type="password"],
    .staticrypt-password-container input[type="text"] {
      width: 100%;
      background: #0F1117;
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #F9FAFB;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      padding: 13px 44px 13px 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .staticrypt-password-container input:focus {
      border-color: #C8191A;
    }
    .staticrypt-password-container input::placeholder {
      color: #4B5563;
    }

    .staticrypt-toggle-password-visibility {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      opacity: 0.4;
      cursor: pointer;
      filter: invert(1);
      transition: opacity 0.2s;
    }
    .staticrypt-toggle-password-visibility:hover { opacity: 0.7; }

    /* ── Remember me ── */
    label.staticrypt-remember {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      cursor: pointer;
    }
    .staticrypt-remember input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #C8191A;
      cursor: pointer;
      flex-shrink: 0;
    }
    .staticrypt-remember-text {
      font-size: 13px;
      color: #9CA3AF;
      font-weight: 500;
      user-select: none;
    }

    /* ── Button ── */
    .staticrypt-decrypt-button {
      width: 100%;
      background: #C8191A;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.3px;
      padding: 14px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .staticrypt-decrypt-button:hover { background: #A81516; }
    .staticrypt-decrypt-button:active { transform: scale(0.99); }

    /* ── Footer tag ── */
    .suno-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 11px;
      color: #374151;
      font-weight: 500;
    }

    .hidden { display: none !important; }
  </style>
</head>
