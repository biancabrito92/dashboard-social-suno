<!DOCTYPE html>
<html class="staticrypt-html">
<head>
  <meta charset="utf-8" />
  <title>Bem-vindo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="cache-control" content="max-age=0" />
  <meta http-equiv="cache-control" content="no-cache" />
  <meta http-equiv="expires" content="0" />
  <meta http-equiv="pragma" content="no-cache" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .staticrypt-html, .staticrypt-body {
      height: 100%;
      font-family: 'Inter', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .staticrypt-body {
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* Spinner */
    .staticrypt-spinner-container {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .staticrypt-spinner {
      width: 2rem; height: 2rem;
      border: 3px solid rgba(255,255,255,0.1);
      border-right-color: #C8191A;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* Outer wrapper */
    .staticrypt-content {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Card */
    .staticrypt-form {
      background: #FFFFFF;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    }

    /* Red Suno header strip */
    .suno-card-header {
      background: #C8191A;
      padding: 28px 36px 24px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }
    .suno-card-header img {
      height: 28px;
      width: auto;
      filter: brightness(0) invert(1);
    }
    .suno-card-header-text {
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.1px;
    }

    /* Form body */
    .suno-card-body {
      padding: 28px 36px 32px;
    }

    .staticrypt-title {
      font-size: 20px;
      font-weight: 800;
      color: #111827;
      margin-bottom: 6px;
      letter-spacing: -0.4px;
    }

    .staticrypt-instructions {
      font-size: 13px;
      color: #6B7280;
      margin-bottom: 24px;
      font-weight: 500;
    }

    /* Input */
    .staticrypt-password-container {
      position: relative;
      width: 100%;
      margin-bottom: 16px;
    }
    .staticrypt-password-container input[type="password"],
    .staticrypt-password-container input[type="text"] {
      width: 100%;
      background: #F9FAFB;
      border: 1.5px solid #E5E7EB;
      border-radius: 10px;
      color: #111827;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      padding: 13px 44px 13px 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .staticrypt-password-container input:focus {
      border-color: #C8191A;
      box-shadow: 0 0 0 3px rgba(200,25,26,0.12);
      background: #fff;
    }
    .staticrypt-password-container input::placeholder {
      color: #9CA3AF;
    }

    .staticrypt-toggle-password-visibility {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      opacity: 0.35;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .staticrypt-toggle-password-visibility:hover { opacity: 0.65; }

    /* Hide remember me completely */
    label.staticrypt-remember { display: none !important; }

    /* Button */
    .staticrypt-decrypt-button {
      width: 100%;
      background: #C8191A;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.3px;
      padding: 14px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .staticrypt-decrypt-button:hover { background: #A81516; }
    .staticrypt-decrypt-button:active { transform: scale(0.99); }

    /* Shake animation for wrong password */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60% { transform: translateX(-6px); }
      40%,80% { transform: translateX(6px); }
    }
    .shake { animation: shake 0.4s ease; }

    .hidden { display: none !important; }
  </style>
</head>
